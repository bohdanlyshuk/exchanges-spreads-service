# postgres: spread history backend
#   docker compose up -d postgres
#
# postgres + app (profile full):
#   docker compose --profile full up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spreads
      POSTGRES_PASSWORD: spreads
      POSTGRES_DB: spreads
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spreads -d spreads"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      PORT: 8000
      HTTP_TIMEOUT: 5
      LOG_LEVEL: INFO
      PRICE_UPDATE_INTERVAL: 1
      # Optional: comma-separated exchanges, e.g. "bybit,binance,mexc". Empty = all (bybit, binance, mexc, gate, kucoin, bingx, bitget).
      # ENABLED_EXCHANGES: "bybit,binance,mexc"
      DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      SPREAD_HISTORY_INTERVAL_SECONDS: 300
      # CORS: "*" = allow all origins, or comma-separated list, e.g. "https://myapp.com,http://localhost:5173"
      # CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
